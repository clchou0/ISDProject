{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="card card-narrow">
  <h1>Sign In</h1>
  <p class="text-muted">Welcome back to IoTBay</p>

  <div id="feedback"></div>

  <form hx-post="/api/auth/login" hx-target="#feedback" hx-swap="innerHTML">
    <label for="email" class="asterisk">Email</label>
    <input type="email" name="email" required placeholder="john@example.com">

    <label for="password" class="asterisk">Password</label>
    <input type="password" name="password" required placeholder="Your password">

    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
  </form>

  <p class="text-center text-muted">Don't have an account? <a href="/register">Register</a></p>
</div>
{% endblock %}
